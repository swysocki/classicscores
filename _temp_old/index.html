<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Scores</title>
    <link rel="stylesheet" type="text/css" href="static/styles/main.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto|Lobster|Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.7.2/css/solid.css"
      integrity="sha384-r/k8YTFqmlOaqRkZuSiE9trsrDXkh07mRaoGBMoDcmA58OHILZPsk29i2BsFng1B"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.7.2/css/fontawesome.css"
      integrity="sha384-4aon80D8rXCGx9ayDt85LbyUHeMWd3UiBaWliBlJ53yzm9hqN21A+o1pqoyK04h+"
      crossorigin="anonymous"
    />
    <link rel="prefetch" href="/static/data/tournament_data.json" as="fetch" />
    <script
      type="text/javascript"
      src="/static/scripts/tournaments.js"
    ></script>
  </head>

  <body>
    <div class="header">
      <div class="pure-g">
        <div class="pure-u-1">
          <h1 class="header">www.ClassicScores.com</h1>
        </div>
      </div>
    </div>
    <div class="menu">
      <div class="pure-g">
        <div id="year-container" class="pure-u-1 pure-u-md-1-2">
          <h3>Years</h3>
        </div>
        <div id="league-container" class="pure-u-1 pure-u-md-1-2">
          <h3>Leagues</h3>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="pure-g">
        <div id="result-container" class="pure-u-1">
          <div class="hero-image">
            <div class="stats">
              <h3 class="content" id="scores-count"></h3>
              <h3 class="content" id="tournament-count"></h3>
              <h3 class="content" id="year-count"></h3>
              <h3 class="content" id="league-count"></h3>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <footer>copyright 2020 www.classicscores.com</footer>
</html>
